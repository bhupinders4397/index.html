<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Online Games Hub</title>
    <style>
        body { margin: 0; font-family: Arial, sans-serif; background: linear-gradient(135deg,#0f172a,#1e293b); color: white; }
        header { padding: 20px; text-align: center; font-size: 26px; background: #020617; font-weight: bold; }
        
        nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; padding: 12px; background: #1e293b; }
        nav input { padding: 10px; border-radius: 6px; border: none; width: 220px; outline: none; }
        nav button { padding: 10px 15px; border: none; background: #334155; color: white; cursor: pointer; border-radius: 6px; transition: 0.3s; }
        nav button:hover { background: #ff4757; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 18px; padding: 20px; }
        
        .card { background: #1e293b; padding: 12px; border-radius: 12px; text-align: center; height: 250px; display: flex; flex-direction: column; justify-content: center; }
        .thumbnail { width: 100%; height: 180px; background: #0f172a; display: flex; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; border: 2px solid #334155; }
        .thumbnail:hover { border-color: #ff4757; }
        
        iframe { width: 100%; height: 100%; border: none; border-radius: 8px; }

        footer { text-align: center; padding: 25px 10px; background: rgba(0,0,0,0.7); margin-top: 30px; }
        .powered { margin-top: 10px; font-size: 14px; color: #ccc; }
        .powered strong { color: #ff4757; }

        #ageModal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #1e293b; padding: 25px; border-radius: 10px; text-align: center; }
        .modal-box button { margin: 10px; padding: 10px 20px; border: none; cursor: pointer; }
        .yes { background: green; color: white; } .no { background: red; color: white; }
    </style>
</head>
<body>

<header>🎮 Free Online Games Hub</header>

<nav>
    <input type="text" id="searchInput" placeholder="🔍 Search games..." onkeyup="applyFilters()">
    <button onclick="setCategory('all')">All</button>
    <button onclick="setCategory('action')">Action</button>
    <button onclick="setCategory('adventure')">Adventure</button>
    <button onclick="openAdult()">18+</button>
</nav>

<div class="grid" id="gameContainer"></div>

<footer>
    <p>© 2026 Free Online Games Hub</p>
    <div class="powered">⚡ Powered by <strong>Bhupendra Saini</strong></div>
</footer>

<div id="ageModal">
    <div class="modal-box">
        <h2>Are you 18+?</h2>
        <button class="yes" onclick="enterAdult()">Yes</button>
        <button class="no" onclick="closeModal()">No</button>
    </div>
</div>

<script>
    let selectedCategory = "all";
    const games = [
        {title:"Subway Surfers", category:"adventure", url:"https://www.crazygames.com/embed/subway-surfers"},
        {title:"Temple Run 2", category:"adventure", url:"https://www.crazygames.com/embed/temple-run-2"},
        {title:"Bullet Force", category:"action", url:"https://www.crazygames.com/embed/bullet-force"},
        {title:"Shell Shockers", category:"action", url:"https://www.crazygames.com/embed/shellshockers"},
        {title:"Drift Hunters", category:"action", url:"https://www.crazygames.com/embed/drift-hunters"},
        {title:"Moto X3M", category:"action", url:"https://www.crazygames.com/embed/moto-x3m"},
        {title:"Stickman Hook", category:"adventure", url:"https://www.crazygames.com/embed/stickman-hook"},
        {title:"Fireboy & Watergirl", category:"adventure", url:"https://www.crazygames.com/embed/fireboy-and-watergirl-forest-temple"},
        {title:"Zombs Royale", category:"action", url:"https://www.crazygames.com/embed/zombs-royale"},
        {title:"Krunker", category:"action", url:"https://www.crazygames.com/embed/krunker-io"}
    ];

    function applyFilters() {
        const search = document.getElementById("searchInput").value.toLowerCase();
        const container = document.getElementById("gameContainer");
        container.innerHTML = "";

        games.forEach((game, index) => {
            const matchCategory = selectedCategory === "all" || game.category === selectedCategory;
            const matchSearch = game.title.toLowerCase().includes(search);

            if (matchCategory && matchSearch) {
                const card = document.createElement("div");
                card.className = "card";
                card.innerHTML = `
                    <h3>${game.title}</h3>
                    <div class="thumbnail" id="thumb-${index}" onclick="loadGame(${index}, '${game.url}')">
                        <p>▶ Click to Play</p>
                    </div>
                `;
                container.appendChild(card);
            }
        });
    }

    function loadGame(index, url) {
        const thumb = document.getElementById(`thumb-${index}`);
        thumb.innerHTML = `<iframe src="${url}" allowfullscreen></iframe>`;
        thumb.style.cursor = "default";
    }

    function setCategory(cat) {
        selectedCategory = cat;
        applyFilters();
    }

    // --- SECURITY THEATER (Unchanged per request) ---
    function openAdult() { document.getElementById("ageModal").style.display = "flex"; }
    function enterAdult() { selectedCategory = "adult"; closeModal(); alert("Adult section unlocked."); }
    function closeModal() { document.getElementById("ageModal").style.display = "none"; }

    applyFilters();
</script>

</body>
</html>
